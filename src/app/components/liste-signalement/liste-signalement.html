<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="fw-bold">Tableau de Bord</h1>
      <p class="text-muted">
        Consultez et gérez les signalements de votre secteur.
      </p>
    </div>

    <button routerLink="signalement/creer" class="btn btn-primary btn-lg">
      + Nouveau Signalement
    </button>
  </div>

  <!-- Recherche + Filtres -->
  <div class="row mb-4 g-3">

    <div class="col-md-7">
      <input
        type="text"
        class="form-control"
        placeholder="Rechercher par mot-clé, rue ou catégorie..."
      >
    </div>

    <div class="col-md-5">
      <div class="btn-group w-100">
        <button class="btn btn-outline-secondary active">Tout</button>
        <button class="btn btn-outline-secondary">Voirie</button>
        <button class="btn btn-outline-secondary">Éclairage</button>
        <button class="btn btn-outline-secondary">Déchets</button>
        <button class="btn btn-outline-secondary">Sécurité</button>
      </div>
    </div>

  </div>

  <!-- Statistiques -->
  <div class="row g-3 mb-5">

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h6 class="text-muted">Total signalements</h6>
          <h2>1284</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h6 class="text-muted">Signalements actifs</h6>
          <h2>387</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h6 class="text-muted">Total soutiens</h6>
          <h2>1245</h2>
        </div>
      </div>
    </div>

  </div>

  <!-- Liste des incidents -->
  <div class="row g-4">

    <!-- Carte 1 -->
    <div class="col-md-4">

      <div class="card h-100 shadow-sm">

        <img
          src="https://placehold.co/600x300"
          class="card-img-top"
          alt=""
        >

        <div class="card-body">

          <div class="d-flex justify-content-between mb-2">
            <span class="badge bg-secondary">
              Voirie
            </span>

            <small class="text-muted">
              Il y a 2 heures
            </small>
          </div>

          <h5 class="card-title">
            Nid-de-poule dangereux
          </h5>

          <p class="text-muted">
            24 Rue de la Liberté
          </p>

          <p class="card-text">
            Un trou important s'est formé au milieu de la chaussée...
          </p>

        </div>

        <div
          class="card-footer bg-white d-flex justify-content-between align-items-center"
        >

          <span class="text-danger">
            ❤️ 42
          </span>

          <div class="d-flex gap-2">
            <button class="btn btn-outline-dark">
              Détails
            </button>

            <button class="btn btn-primary">
              Soutenir
            </button>
          </div>

        </div>

      </div>

    </div>

  </div>

 

</div>
